name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weather_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pre-commit

      - name: Set environment variables
        run: |
          echo "TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/weather_test" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/weather_test" >> $GITHUB_ENV
          echo "FYLLO_BASE_URL=https://dummy-url.com" >> $GITHUB_ENV
          echo "FARM_USER_ID=test" >> $GITHUB_ENV
          echo "FYLLO_PASSWORD=test" >> $GITHUB_ENV

      - name: Run pre-commit (lint, format, docstring)
        run: pre-commit run --all-files

      - name: Run tests with coverage
        run: pytest --cov=app --cov-fail-under=80 --cov-report=term
